name: pritech

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pritech/app:latest
    container_name: pritech-app
    restart: unless-stopped
    environment:
      APP_NAME: "PRITECH Issue Tracker"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_KEY: base64:5Gd1N445/c4bJ1qa0xADiV3d88gm12ChGjKdYQOXo2E=
      LOG_CHANNEL: stderr
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: pritech
      DB_USERNAME: pritech
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      RUN_MIGRATIONS: "1"
      RUN_SEED: "1"
    depends_on:
      db:
        condition: service_healthy
    networks: [pritech]

  web:
    image: nginx:1.27-alpine
    container_name: pritech-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
    networks: [pritech]

  db:
    image: mysql:8.4
    container_name: pritech-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: pritech
      MYSQL_USER: pritech
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [pritech]

volumes:
  db_data:

networks:
  pritech:
